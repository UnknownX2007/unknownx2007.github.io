<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video khởi động - Chí Phèo</title>

  <!-- Dùng style.css có sẵn của dự án -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="station-page station-video">
  <main class="game-screen alley-mode">
    <header class="topbar">
      <div class="humanity-box">
        <span>Video khởi động</span>
        <div class="humanity-track">
          <div class="humanity-fill" style="width: 100%;"></div>
        </div>
      </div>

      <div class="timer">Chí Phèo</div>

      <div class="locks">
        <span class="lock broken">▶</span>
      </div>
    </header>

    <section class="viewport village-alley">
      <div class="sky dark-sky"></div>
      <div class="back-layer village-back"></div>
      <div class="mid-layer narrow-alley"></div>
      <div class="fog fog-a"></div>
      <div class="fog fog-b"></div>

      <div class="question-card video-card">
        <h2>Video</h2>
        <video controls autoplay muted playsinline width="100%">
          <source src="chipheoanvabakien.mp4" type="video/mp4" />
          <source src="video.webm" type="video/webm" />
          Trình duyệt của bạn không hỗ trợ phát video.
        </video>
      </div>
    </section>

    <section class="bottom-panel">
      <div class="dialogue">
        Hãy xem video để bước vào không khí làng Vũ Đại và chuẩn bị cho hoạt động tiếp theo.
      </div>

      <div class="control-panel">
        <button class="main-btn" type="button" onclick="document.querySelector('video').play()">
          Phát video
        </button>

        <button class="main-btn ghost" type="button" onclick="document.querySelector('video').pause()">
          Tạm dừng
        </button>
      </div>
    </section>
  </main>
</body>
</html>
